<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; background: #07080f; }
      body { font-family: "Inter", sans-serif; color: #f8fafc; }
      .scene { position: absolute; inset: 0; }
      .overline { font-family: "JetBrains Mono", monospace; font-size: 26px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #8497bd; }
      .overline b { color: #2d7ff9; font-weight: 600; }
      #bgimg { position: absolute; inset: 0; }
      #bgimg .bg { position: absolute; inset: 0; width: 1080px; height: 1920px; object-fit: cover; }
      #bgimg .veil { position: absolute; inset: 0; background: radial-gradient(125% 55% at 50% 42%, rgba(5,6,16,0.5) 0%, rgba(5,6,16,0) 62%), linear-gradient(180deg, rgba(5,6,16,0.74) 0%, rgba(5,6,16,0.5) 34%, rgba(5,6,16,0.62) 56%, rgba(5,6,16,0.97) 100%); }
      #hook .text, #hook .ov, #payoff .text, #payoff .big, #payoff .sub, .caption, #plabel, #cta .site, #cta .re { text-shadow: 0 2px 22px rgba(5,6,16,0.82); }
      #hook .text { position: absolute; top: 760px; left: 80px; right: 80px; text-align: center; font-size: 82px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.18; }
      #hook .text em { font-style: normal; color: #2d7ff9; }
      #hook .ov { position: absolute; top: 660px; left: 0; right: 0; text-align: center; }
      .panel { position: absolute; left: 80px; width: 920px; background: #0b1e3a; border: 1px solid rgba(248,250,252,0.09); border-radius: 16px; box-shadow: 0 16px 48px rgba(3,9,26,0.55); }
      .panel .ph { display: flex; justify-content: space-between; align-items: center; padding: 28px 34px; border-bottom: 1px solid rgba(248,250,252,0.07); }
      .panel .ph .t { font-size: 32px; font-weight: 600; }
      .panel .ph .m { font-family: "JetBrains Mono", monospace; font-size: 19px; font-weight: 600; letter-spacing: 0.08em; color: #8497bd; text-transform: uppercase; }
      #pl { top: 520px; }
      #pl .chartwrap { padding: 30px 34px 10px; }
      #pl svg { width: 100%; height: 280px; display: block; }
      #pl .axis { stroke: rgba(248,250,252,0.12); stroke-width: 2; }
      #pl .gridline { stroke: rgba(248,250,252,0.05); stroke-width: 1; }
      #pl .trend { fill: none; stroke: #2d7ff9; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
      #pl .area { fill: url(#grad); opacity: 0.9; }
      #pl .dot { fill: #2d7ff9; }
      #pl .months { display: flex; gap: 10px; padding: 6px 34px 14px; font-family: "JetBrains Mono", monospace; font-size: 16px; font-weight: 600; letter-spacing: 0.06em; color: #8497bd; }
      #pl .months span { flex: 1; text-align: center; }
      #pl .foot { display: flex; gap: 15px; align-items: center; padding: 20px 30px; border-top: 1px solid rgba(248,250,252,0.07); }
      .chip { padding: 11px 20px; border-radius: 999px; font-size: 22px; font-weight: 500; border: 1px solid rgba(248,250,252,0.12); color: #b5c2d7; }
      .chip.ok { color: #27d7a1; border-color: rgba(39,215,161,0.35); }
      #pl .foot .kept { margin-left: auto; font-family: "JetBrains Mono", monospace; font-size: 19px; font-weight: 600; letter-spacing: 0.06em; color: #8497bd; }
      #plabel { position: absolute; top: 430px; left: 80px; }
      #payoff .text { position: absolute; top: 800px; left: 70px; right: 70px; text-align: center; font-size: 82px; font-weight: 600; letter-spacing: -0.025em; line-height: 1.18; }
      #payoff .text em { font-style: normal; color: #2d7ff9; }
      #cta .logo { position: absolute; top: 660px; left: 290px; width: 500px; }
      #cta .btn { position: absolute; top: 920px; left: 50%; transform: translateX(-50%); padding: 30px 60px; border-radius: 12px; background: #2d7ff9; font-size: 40px; font-weight: 600; white-space: nowrap; box-shadow: 0 16px 48px rgba(45,127,249,0.35); }
      #cta .site { position: absolute; top: 1080px; left: 0; right: 0; text-align: center; font-family: "JetBrains Mono", monospace; font-size: 34px; font-weight: 600; letter-spacing: 0.14em; color: #f8fafc; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="reel10" data-start="0" data-duration="15" data-width="1080" data-height="1920">
      <div id="bgimg" class="clip" data-start="0" data-duration="15" data-track-index="0">
        <img class="bg bgA" src="../assets/ig/imp-team-progress.png" alt="" />
        <img class="bg bgB" src="../assets/ig/imp-coach-morning.png" alt="" style="opacity:0" />
        <img class="bg bgC" src="../assets/ig/imp-team-huddle.png" alt="" style="opacity:0" />
        <div class="veil"></div>
      </div>
      <audio id="music" data-start="0" data-duration="15" data-track-index="9" data-volume="0.65" src="../assets/stomp-15s.wav"></audio>

      <div id="hook" class="scene clip" data-start="0" data-duration="3" data-track-index="1">
        <div class="ov overline">La progression</div>
        <div class="text" id="hooktext">Et si chaque saison vous rendait <em>plus fort</em> ?</div>
      </div>

      <div id="feat" class="scene clip" data-start="3" data-duration="6.5" data-track-index="1">
        <div id="plabel" class="overline"><b>Historique</b> · tout reste, rien ne se ressaisit</div>
        <div class="panel" id="pl">
          <div class="ph"><span class="t">Disponibilité du groupe</span><span class="m">6 mois</span></div>
          <div class="chartwrap">
            <svg viewBox="0 0 852 280" xmlns="http://www.w3.org/2000/svg">
              <defs>
                <linearGradient id="grad" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#2d7ff9" stop-opacity="0.32" />
                  <stop offset="100%" stop-color="#2d7ff9" stop-opacity="0" />
                </linearGradient>
              </defs>
              <line class="gridline" x1="40" y1="60" x2="852" y2="60" />
              <line class="gridline" x1="40" y1="140" x2="852" y2="140" />
              <line class="gridline" x1="40" y1="220" x2="852" y2="220" />
              <line class="axis" x1="40" y1="20" x2="40" y2="250" />
              <line class="axis" x1="40" y1="250" x2="852" y2="250" />
              <path id="area" class="area" d="M 40 210 L 175 196 L 310 200 L 446 150 L 581 120 L 717 84 L 800 70 L 800 250 L 40 250 Z" />
              <path id="trend" class="trend" d="M 40 210 L 175 196 L 310 200 L 446 150 L 581 120 L 717 84 L 800 70" />
              <circle class="dot d1" cx="40" cy="210" r="7" />
              <circle class="dot d2" cx="175" cy="196" r="7" />
              <circle class="dot d3" cx="310" cy="200" r="7" />
              <circle class="dot d4" cx="446" cy="150" r="7" />
              <circle class="dot d5" cx="581" cy="120" r="7" />
              <circle class="dot d6" cx="717" cy="84" r="7" />
              <circle class="dot d7" cx="800" cy="70" r="9" />
            </svg>
          </div>
          <div class="months"><span>Jan</span><span>Fév</span><span>Mar</span><span>Avr</span><span>Mai</span><span>Juin</span></div>
          <div class="foot">
            <span class="chip ok" id="c1">Présence +18 %</span>
            <span class="chip" id="c2">Blessures −2</span>
            <span class="kept" id="kept">Dossiers conservés</span>
          </div>
        </div>
      </div>

      <div id="payoff" class="scene clip" data-start="9.5" data-duration="2.5" data-track-index="1">
        <div class="text" id="payofftext">Vous progressez.<br /><em>Vos données aussi.</em></div>
      </div>

      <div id="cta" class="scene clip" data-start="12" data-duration="3" data-track-index="1">
        <img class="logo" id="ctalogo" src="../assets/logo.png" alt="STRIVN" />
        <div class="btn" id="ctabtn">Disponible maintenant</div>
        <div class="site" id="ctasite">strivn.net</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });
      tl.fromTo("#bgimg .bg", { scale: 1.12 }, { scale: 1, duration: 15, ease: "none" }, 0);
      tl.fromTo("#bgimg .bgA", { opacity: 1 }, { opacity: 0, duration: 0.7 }, 2.8);
      tl.fromTo("#bgimg .bgB", { opacity: 0 }, { opacity: 1, duration: 0.7 }, 2.8);
      tl.fromTo("#bgimg .bgB", { opacity: 1 }, { opacity: 0, duration: 0.7 }, 8.9);
      tl.fromTo("#bgimg .bgC", { opacity: 0 }, { opacity: 1, duration: 0.7 }, 8.9);

      tl.from("#hook .ov", { opacity: 0, y: -20, duration: 0.4 }, 0.1);
      tl.from("#hooktext", { opacity: 0, y: 60, duration: 0.55 }, 0.3);
      tl.to("#hook", { opacity: 0, y: -50, duration: 0.35, ease: "power2.in" }, 2.65);
      tl.set("#hook", { opacity: 0 }, 3);

      tl.from("#plabel", { opacity: 0, x: -32, duration: 0.4 }, 3.1);
      tl.from("#pl", { opacity: 0, y: 90, duration: 0.55 }, 3.25);
      const trend = document.getElementById("trend");
      const L = trend.getTotalLength();
      trend.style.strokeDasharray = L; trend.style.strokeDashoffset = L;
      tl.to("#trend", { strokeDashoffset: 0, duration: 1.5, ease: "power2.inOut" }, 4.0);
      tl.from("#area", { opacity: 0, duration: 1.2 }, 4.3);
      tl.from("#pl .d1", { scale: 0, transformOrigin: "center", duration: 0.25, ease: "back.out(3)" }, 4.2);
      tl.from("#pl .d2", { scale: 0, transformOrigin: "center", duration: 0.25, ease: "back.out(3)" }, 4.4);
      tl.from("#pl .d3", { scale: 0, transformOrigin: "center", duration: 0.25, ease: "back.out(3)" }, 4.6);
      tl.from("#pl .d4", { scale: 0, transformOrigin: "center", duration: 0.25, ease: "back.out(3)" }, 4.8);
      tl.from("#pl .d5", { scale: 0, transformOrigin: "center", duration: 0.25, ease: "back.out(3)" }, 5.0);
      tl.from("#pl .d6", { scale: 0, transformOrigin: "center", duration: 0.25, ease: "back.out(3)" }, 5.2);
      tl.from("#pl .d7", { scale: 0, transformOrigin: "center", duration: 0.3, ease: "back.out(3)" }, 5.4);
      tl.from("#c1", { opacity: 0, y: 16, duration: 0.35 }, 5.8);
      tl.from("#c2", { opacity: 0, y: 16, duration: 0.35 }, 6.0);
      tl.from("#kept", { opacity: 0, duration: 0.35 }, 6.25);
      tl.to("#feat", { opacity: 0, scale: 0.97, duration: 0.35, ease: "power2.in" }, 9.15);
      tl.set("#feat", { opacity: 0 }, 9.5);

      tl.from("#payofftext", { opacity: 0, scale: 1.4, duration: 0.4, ease: "power4.out" }, 9.6);
      tl.to("#payoff", { opacity: 0, duration: 0.3, ease: "power2.in" }, 11.7);
      tl.set("#payoff", { opacity: 0 }, 12);

      tl.from("#ctalogo", { opacity: 0, y: 30, duration: 0.5 }, 12.1);
      tl.from("#ctabtn", { opacity: 0, y: 30, scale: 0.92, duration: 0.45, ease: "back.out(1.6)" }, 12.35);
      tl.from("#ctasite", { opacity: 0, duration: 0.4 }, 12.65);
      tl.fromTo("#ctabtn", { scale: 1 }, { scale: 1.05, duration: 0.5, yoyo: true, repeat: 2, ease: "sine.inOut" }, 13.2);

      window.__timelines["reel10"] = tl;
    </script>
  </body>
</html>
