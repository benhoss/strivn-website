<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; background: #07080f; }
      body { font-family: "Inter", sans-serif; color: #f8fafc; }
      .scene { position: absolute; inset: 0; }
      .overline { font-family: "JetBrains Mono", monospace; font-size: 26px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #8497bd; }
      .overline b { color: #2d7ff9; font-weight: 600; }
      #bgimg { position: absolute; inset: 0; }
      #bgimg .bg { position: absolute; inset: 0; width: 1080px; height: 1920px; object-fit: cover; }
      #bgimg .veil { position: absolute; inset: 0; background: radial-gradient(125% 55% at 50% 42%, rgba(5,6,16,0.5) 0%, rgba(5,6,16,0) 62%), linear-gradient(180deg, rgba(5,6,16,0.74) 0%, rgba(5,6,16,0.5) 34%, rgba(5,6,16,0.62) 56%, rgba(5,6,16,0.97) 100%); }
      #hook .text, #hook .ov, #payoff .text, #payoff .big, #payoff .sub, .caption, #plabel, #cta .site, #cta .re { text-shadow: 0 2px 22px rgba(5,6,16,0.82); }
      #hook .text { position: absolute; top: 760px; left: 80px; right: 80px; text-align: center; font-size: 84px; font-weight: 600; letter-spacing: -0.02em; line-height: 1.18; }
      #hook .text em { font-style: normal; color: #2d7ff9; }
      #hook .ov { position: absolute; top: 660px; left: 0; right: 0; text-align: center; }
      .panel { position: absolute; left: 80px; width: 920px; background: #0b1e3a; border: 1px solid rgba(248,250,252,0.09); border-radius: 16px; box-shadow: 0 16px 48px rgba(3,9,26,0.55); }
      .panel .ph { display: flex; justify-content: space-between; align-items: center; padding: 28px 34px; border-bottom: 1px solid rgba(248,250,252,0.07); }
      .panel .ph .t { font-size: 32px; font-weight: 600; }
      .panel .ph .m { font-family: "JetBrains Mono", monospace; font-size: 19px; font-weight: 600; letter-spacing: 0.08em; color: #27d7a1; text-transform: uppercase; display: flex; align-items: center; gap: 10px; }
      .panel .ph .m::before { content: ""; width: 12px; height: 12px; border-radius: 50%; background: #27d7a1; }
      #pl { top: 560px; }
      #pl .row { display: flex; align-items: center; gap: 24px; padding: 30px 34px; border-bottom: 1px solid rgba(248,250,252,0.06); font-size: 30px; }
      #pl .row:last-child { border-bottom: none; }
      #pl .av { width: 60px; height: 60px; border-radius: 50%; flex: none; display: flex; align-items: center; justify-content: center; font-family: "JetBrains Mono", monospace; font-size: 24px; font-weight: 600; color: #f8fafc; }
      #pl .av.c { background: #294471; } #pl .av.m { background: #1a3258; } #pl .av.k { background: #112849; }
      #pl .who { display: flex; flex-direction: column; gap: 4px; }
      #pl .who .role { font-size: 30px; font-weight: 600; }
      #pl .who .what { font-size: 22px; color: #8497bd; }
      #pl .row .tag { margin-left: auto; font-family: "JetBrains Mono", monospace; font-size: 18px; font-weight: 600; letter-spacing: 0.06em; color: #27d7a1; }
      #plabel { position: absolute; top: 470px; left: 80px; }
      #payoff .text { position: absolute; top: 820px; left: 70px; right: 70px; text-align: center; font-size: 92px; font-weight: 600; letter-spacing: -0.025em; line-height: 1.15; }
      #payoff .text em { font-style: normal; color: #2d7ff9; }
      #cta .logo { position: absolute; top: 660px; left: 290px; width: 500px; }
      #cta .btn { position: absolute; top: 920px; left: 50%; transform: translateX(-50%); padding: 30px 60px; border-radius: 12px; background: #2d7ff9; font-size: 40px; font-weight: 600; white-space: nowrap; box-shadow: 0 16px 48px rgba(45,127,249,0.35); }
      #cta .site { position: absolute; top: 1080px; left: 0; right: 0; text-align: center; font-family: "JetBrains Mono", monospace; font-size: 34px; font-weight: 600; letter-spacing: 0.14em; color: #f8fafc; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="reel7" data-start="0" data-duration="14" data-width="1080" data-height="1920">
      <div id="bgimg" class="clip" data-start="0" data-duration="14" data-track-index="0">
        <img class="bg bgA" src="../assets/ig/imp-staff-touchline.png" alt="" />
        <img class="bg bgB" src="../assets/ig/imp-coach-morning.png" alt="" style="opacity:0" />
        <img class="bg bgC" src="../assets/ig/imp-team-huddle.png" alt="" style="opacity:0" />
        <div class="veil"></div>
      </div>
      <audio id="music" data-start="0" data-duration="14" data-track-index="9" data-volume="0.65" src="../assets/stomp-14s.wav"></audio>

      <div id="hook" class="scene clip" data-start="0" data-duration="3" data-track-index="1">
        <div class="ov overline">La coordination</div>
        <div class="text" id="hooktext">Imaginez tout le staff <em>sur la même page</em>.</div>
      </div>

      <div id="feat" class="scene clip" data-start="3" data-duration="6.5" data-track-index="1">
        <div id="plabel" class="overline"><b>N. Diallo</b> · dossier partagé</div>
        <div class="panel" id="pl">
          <div class="ph"><span class="t">Dossier joueur</span><span class="m">Temps réel</span></div>
          <div class="row r1"><span class="av c">C</span><span class="who"><span class="role">Coach</span><span class="what">Voit la disponibilité</span></span><span class="tag">à jour</span></div>
          <div class="row r2"><span class="av m">M</span><span class="who"><span class="role">Médecin</span><span class="what">Note ajoutée</span></span><span class="tag">à jour</span></div>
          <div class="row r3"><span class="av k">K</span><span class="who"><span class="role">Kiné</span><span class="what">Protocole mis à jour</span></span><span class="tag">à jour</span></div>
        </div>
      </div>

      <div id="payoff" class="scene clip" data-start="9.5" data-duration="2" data-track-index="1">
        <div class="text" id="payofftext">Une équipe, <em>derrière l'équipe.</em></div>
      </div>

      <div id="cta" class="scene clip" data-start="11.5" data-duration="2.5" data-track-index="1">
        <img class="logo" id="ctalogo" src="../assets/logo.png" alt="STRIVN" />
        <div class="btn" id="ctabtn">Disponible maintenant</div>
        <div class="site" id="ctasite">strivn.net</div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });
      tl.fromTo("#bgimg .bg", { scale: 1.12 }, { scale: 1, duration: 14, ease: "none" }, 0);
      tl.fromTo("#bgimg .bgA", { opacity: 1 }, { opacity: 0, duration: 0.7 }, 2.8);
      tl.fromTo("#bgimg .bgB", { opacity: 0 }, { opacity: 1, duration: 0.7 }, 2.8);
      tl.fromTo("#bgimg .bgB", { opacity: 1 }, { opacity: 0, duration: 0.7 }, 8.9);
      tl.fromTo("#bgimg .bgC", { opacity: 0 }, { opacity: 1, duration: 0.7 }, 8.9);

      tl.from("#hook .ov", { opacity: 0, y: -20, duration: 0.4 }, 0.1);
      tl.from("#hooktext", { opacity: 0, y: 60, duration: 0.55 }, 0.3);
      tl.to("#hook", { opacity: 0, y: -50, duration: 0.35, ease: "power2.in" }, 2.65);
      tl.set("#hook", { opacity: 0 }, 3);

      tl.from("#plabel", { opacity: 0, x: -32, duration: 0.4 }, 3.1);
      tl.from("#pl", { opacity: 0, y: 90, duration: 0.55 }, 3.25);
      tl.from("#pl .r1", { opacity: 0, x: 36, duration: 0.34 }, 4.1);
      tl.from("#pl .r2", { opacity: 0, x: 36, duration: 0.34 }, 4.55);
      tl.from("#pl .r3", { opacity: 0, x: 36, duration: 0.34 }, 5.0);
      tl.from("#pl .r1 .tag", { opacity: 0, scale: 0.6, duration: 0.3, ease: "back.out(2)" }, 5.4);
      tl.from("#pl .r2 .tag", { opacity: 0, scale: 0.6, duration: 0.3, ease: "back.out(2)" }, 5.6);
      tl.from("#pl .r3 .tag", { opacity: 0, scale: 0.6, duration: 0.3, ease: "back.out(2)" }, 5.8);
      tl.to("#feat", { opacity: 0, scale: 0.97, duration: 0.35, ease: "power2.in" }, 9.15);
      tl.set("#feat", { opacity: 0 }, 9.5);

      tl.from("#payofftext", { opacity: 0, scale: 1.4, duration: 0.4, ease: "power4.out" }, 9.6);
      tl.to("#payoff", { opacity: 0, duration: 0.3, ease: "power2.in" }, 11.2);
      tl.set("#payoff", { opacity: 0 }, 11.5);

      tl.from("#ctalogo", { opacity: 0, y: 30, duration: 0.5 }, 11.6);
      tl.from("#ctabtn", { opacity: 0, y: 30, scale: 0.92, duration: 0.45, ease: "back.out(1.6)" }, 11.85);
      tl.from("#ctasite", { opacity: 0, duration: 0.4 }, 12.15);
      tl.fromTo("#ctabtn", { scale: 1 }, { scale: 1.05, duration: 0.5, yoyo: true, repeat: 1, ease: "sine.inOut" }, 12.8);

      window.__timelines["reel7"] = tl;
    </script>
  </body>
</html>
