<!doctype html>
<!--
  Ancre de projet HyperFrames.
  Les vraies compositions vivent dans les dossiers de campagne (1-launch/, 6-demo-charge/, …).
  hyperframes a besoin d'un index.html à la racine pour résoudre un projet ; on rend ensuite
  chaque composition explicitement :
      npx hyperframes render -c 6-demo-charge/demo-9x16.html -o 6-demo-charge/strivn-demo-charge-9x16.mp4
  Ce fichier est volontairement vide (placeholder) — ne pas y mettre de contenu de campagne.
-->
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>* { margin: 0; } html, body { width: 1080px; height: 1920px; background: #07080f; }</style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="1" data-width="1080" data-height="1920"></div>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
